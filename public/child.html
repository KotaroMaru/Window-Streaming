<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>プロジェクター - 子</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* 子画面専用: カーソル非表示 */
    body { cursor: none; }
  </style>
</head>
<body>
<div id="child-app">

  <!-- 受信映像 -->
  <video id="remote-video" autoplay playsinline></video>

  <!-- 自動再生ポリシーでミュートになった場合のアンミュートボタン -->
  <button id="unmute-btn" onclick="remoteVideo.muted=false;remoteVideo.volume=1.0;hideUnmuteButton();">
    ▶ タップして音声を有効にする
  </button>

  <!-- 待機/状態オーバーレイ -->
  <div id="child-overlay">
    <div id="child-spinner"></div>
    <div id="child-status-text">接続待機中...</div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="child.js"></script>
</body>
</html>
