<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>プロジェクター - 子</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* 子画面専用: カーソル非表示 */
    body { cursor: none; }
  </style>
</head>
<body>
<div id="child-app">

  <!-- 受信映像 -->
  <video id="remote-video" autoplay playsinline muted></video>

  <!-- BGM再生用 audio -->
  <audio id="child-audio" autoplay></audio>

  <!-- 待機/状態オーバーレイ -->
  <div id="child-overlay">
    <div id="child-spinner"></div>
    <div id="child-status-text">接続待機中...</div>
    <!-- BGMビジュアライザー（装飾） -->
    <div id="bgm-visualizer">
      <div class="bar" style="--d:0.7s;--h:40px"></div>
      <div class="bar" style="--d:0.9s;--h:30px"></div>
      <div class="bar" style="--d:0.6s;--h:50px"></div>
      <div class="bar" style="--d:1.1s;--h:25px"></div>
      <div class="bar" style="--d:0.8s;--h:45px"></div>
      <div class="bar" style="--d:0.65s;--h:35px"></div>
      <div class="bar" style="--d:0.95s;--h:55px"></div>
    </div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="child.js"></script>
</body>
</html>
