<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>プロジェクター制御 - 親</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="parent-app">

  <header class="app-header">
    <h1>🎬 プロジェクター<span>制御</span></h1>
    <div id="status-bar" class="status-bar">
      <div id="status-dot" class="status-dot"></div>
      <span id="status-text">子PC: 未接続</span>
    </div>
  </header>

  <!-- 画面共有カード -->
  <div class="card">
    <h2>画面共有</h2>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:14px;">
      「画面共有開始」を押すとシステム音声を含む画面をプロジェクターへ配信します。<br>
      共有ダイアログでは「タブ」を選択し「Share audio」にチェックを入れてください（Mac）。
    </p>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
      <button class="btn btn-primary" id="btn-start-share" onclick="startScreenShare()">
        ▶ 画面共有開始
      </button>
      <button class="btn btn-danger" id="btn-stop-share" onclick="stopScreenShare()" disabled>
        ■ 配信停止
      </button>
    </div>
    <div id="share-status" style="margin-top:12px;font-size:13px;color:var(--text-muted);"></div>
  </div>

  <!-- 音量コントロールカード -->
  <div class="card">
    <h2>音量コントロール</h2>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">
      プロジェクター（子PC）側の音量をリアルタイムで調整します。
    </p>
    <div class="volume-row">
      <span id="volume-icon">🔊</span>
      <input type="range" id="volume-slider" min="0" max="100" value="100"
             oninput="onVolumeInput(this.value)">
      <span id="volume-label">100%</span>
    </div>
    <div style="display:flex;gap:8px;margin-top:12px;">
      <button class="btn btn-ghost" onclick="setVolume(0)">🔇 ミュート</button>
      <button class="btn btn-ghost" onclick="setVolume(50)">50%</button>
      <button class="btn btn-ghost" onclick="setVolume(100)">100%</button>
    </div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="parent.js"></script>
</body>
</html>
